<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lançamentos de Receitas e Despesas</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { margin-bottom: 20px; }
        label { display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; }
        button { padding: 10px; margin-top: 10px; background: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background: #45a049; }
        ul { list-style: none; padding: 0; }
        li { padding: 5px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Lançamentos de Receitas e Despesas</h1>
    <form id="entryForm">
        <label for="description">Descrição:</label>
        <input type="text" id="description" required>
        
        <label for="amount">Valor (R$):</label>
        <input type="number" id="amount" step="0.01" required>
        
        <label for="type">Tipo:</label>
        <select id="type">
            <option value="receita">Receita</option>
            <option value="despesa">Despesa</option>
        </select>
        
        <button type="submit">Adicionar Lançamento</button>
    </form>
    
    <div id="entries"></div>
    
    <h2>Saldo Total: R$ <span id="balance">0.00</span></h2>
    
    <script src="script.js"></script>
</body>
</html>
